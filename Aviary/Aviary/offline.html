<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aviary</title>
  <meta name="theme-color" id="themeColor" content="#FFFFFF" />
  <style>
    :root {
      --font-geist-sans: system-ui, sans-serif;
      --radius: 0.625rem;
      --background: oklch(1 0 0);
      --foreground: oklch(0.145 0 0);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.145 0 0);
      --primary: oklch(0.205 0 0);
      --primary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.97 0 0);
      --muted-foreground: oklch(0.556 0 0);
      --border: oklch(0.922 0 0);
      --accent: oklch(0.97 0 0);
    }
    .dark {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --card: oklch(0.205 0 0);
      --card-foreground: oklch(0.985 0 0);
      --primary: oklch(0.922 0 0);
      --primary-foreground: oklch(0.205 0 0);
      --muted: oklch(0.269 0 0);
      --muted-foreground: oklch(0.708 0 0);
      --border: oklch(1 0 0 / 10%);
      --accent: oklch(0.269 0 0);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-geist-sans);
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 2rem;
    }
    .logo { height: 4rem; width: 8rem; color: var(--foreground); }
    .logo * { fill: currentColor; }
    .theme-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: calc(var(--radius) - 2px);
      border: none;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-btn:hover { background: var(--accent); }
    .theme-btn svg { width: 1.25rem; height: 1.25rem; }

    .content {
      padding: 0 2rem;
    }
    .card {
      background: var(--card);
      color: var(--card-foreground);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      padding: 1.5rem;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .offline-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--muted);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
    }
    .offline-banner svg {
      width: 20px;
      height: 20px;
      color: var(--muted-foreground);
      flex-shrink: 0;
    }
    .offline-banner-text {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      line-height: 1.4;
    }

    .section-label {
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }
    .pending-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .pending-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--muted);
      border-radius: var(--radius);
    }
    .pending-item-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: calc(var(--radius) - 2px);
      background: var(--background);
      flex-shrink: 0;
    }
    .pending-item-icon svg {
      width: 18px;
      height: 18px;
      color: var(--muted-foreground);
    }
    .pending-item-info { flex: 1; min-width: 0; }
    .pending-item-name {
      font-size: 0.875rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pending-item-meta {
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }
    .empty-state {
      text-align: center;
      color: var(--muted-foreground);
      font-size: 0.875rem;
      padding: 2rem 0;
    }
  </style>
  <script>
    (function() {
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) {
        document.documentElement.classList.add('dark');
        var meta = document.getElementById('themeColor');
        if (meta) meta.setAttribute('content', '#000000');
      }
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        document.documentElement.classList.toggle('dark', e.matches);
        var meta = document.getElementById('themeColor');
        if (meta) meta.setAttribute('content', e.matches ? '#000000' : '#FFFFFF');
      });
    })();
  </script>
</head>

  <div class="content">
    <div class="card">
      <div class="card-title">Send Document</div>

      <div class="offline-banner">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
          <line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="offline-banner-text">You're offline. Shared files will be sent when you're back online.</span>
      </div>

      <div class="section-label">Pending Items</div>
      <div id="pending-list" class="pending-list">
        <div class="empty-state">No pending items</div>
      </div>
    </div>
  </div>

  <script>
    var currentTheme = 'system';
    var modes = ['system', 'dark', 'light'];

    function applyTheme(mode) {
      currentTheme = mode;
      var isDark;
      if (mode === 'system') {
        isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      } else {
        isDark = mode === 'dark';
      }
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('themeColor').setAttribute('content', isDark ? '#000000' : '#FFFFFF');

      document.getElementById('theme-icon-system').style.display = mode === 'system' ? '' : 'none';
      document.getElementById('theme-icon-dark').style.display = mode === 'dark' ? '' : 'none';
      document.getElementById('theme-icon-light').style.display = mode === 'light' ? '' : 'none';
    }

    document.getElementById('theme-toggle').addEventListener('click', function() {
      var idx = modes.indexOf(currentTheme);
      var next = modes[(idx + 1) % modes.length];
      applyTheme(next);
    });

    function fileIcon() {
      return '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>';
    }
    function linkIcon() {
      return '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m9.86-2.54a4.5 4.5 0 0 0-1.242-7.244l-4.5-4.5a4.5 4.5 0 0 0-6.364 6.364l1.757 1.757"/></svg>';
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr);
      var now = new Date();
      var diff = now - d;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return d.toLocaleDateString();
    }

    function renderItems(items) {
      var list = document.getElementById('pending-list');
      if (!items || items.length === 0) {
        list.innerHTML = '<div class="empty-state">No pending items</div>';
        return;
      }
      list.innerHTML = items.map(function(item) {
        var icon = item.type === 'url' ? linkIcon() : fileIcon();
        var name = item.type === 'url' ? (item.url || 'URL') : (item.filename || 'File');
        var meta = formatDate(item.createdAt);
        return '<div class="pending-item">' +
          '<div class="pending-item-icon">' + icon + '</div>' +
          '<div class="pending-item-info">' +
            '<div class="pending-item-name">' + name + '</div>' +
            '<div class="pending-item-meta">' + meta + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    window.aviaryOfflineSetItems = renderItems;

    window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.aviary &&
      window.webkit.messageHandlers.aviary.postMessage({ type: 'offlineReady' });
  </script>
